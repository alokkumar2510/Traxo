<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection Interrupted — Traxo</title>
  <style>
    body {
      background-color: #050505;
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .container {
      max-width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      padding: 32px;
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      font-weight: 700;
    }
    p {
      font-size: 13px;
      color: #A1A1AA;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Connection Interrupted</h1>
    <p>Your network link appears to be offline. Traxo will re-establish synchronization as soon as you reconnect.</p>
    <button class="btn" onclick="window.location.reload()">Reload Dashboard</button>
  </div>
</body>
</html>
