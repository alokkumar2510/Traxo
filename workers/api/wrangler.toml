name = "traxo-api"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = [ "nodejs_compat" ]

[vars]
FIREBASE_PROJECT_ID = "traxo-prod-2025"
FIREBASE_API_KEY = "AIzaSyCTb0KLOeacSApDphLM9rvDaMr5L69MEpc"
NEXT_JS_API_URL = "https://traxo.alokkumarsahu.in"
INTERNAL_API_SECRET = "traxo-internal-secret-2025"
# NOTE: Scanner credentials must be set as secrets:
#   wrangler secret put FIREBASE_SCANNER_EMAIL
#   wrangler secret put FIREBASE_SCANNER_PASSWORD

# Cloudflare Queue Producer Binding
[[queues.producers]]
queue = "traxo-scans"
binding = "SCANS_QUEUE"

# Cloudflare Queue Consumer Binding
[[queues.consumers]]
queue = "traxo-scans"
max_batch_size = 10
max_batch_timeout = 2

# Cloudflare Cron Triggers
# Only frequencies that exist in the database schema: hourly, 6h, 12h, daily
[triggers]
crons = [
  "0 * * * *",        # Hourly  → triggers for trackers with frequency="hourly"
  "0 */6 * * *",      # Every 6 hours  → frequency="6h"
  "0 */12 * * *",     # Every 12 hours → frequency="12h"  (was missing before!)
  "0 0 * * *"         # Daily → frequency="daily"
]
